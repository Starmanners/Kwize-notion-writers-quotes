<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kwize Quote of the Day</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="quote-container">
    <iframe
      id="kwize-frame"
      src="https://kwize.com/quote-of-the-day/embed/&txt=0&font=Times&color=ffffff&background=1a1a1a&uid=1752&fid=writing&dy=0"
      frameborder="0"
      loading="lazy"
      title="Kwize Quote of the Day"
    ></iframe>
  </div>

  <script>
    // Detect dark mode
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)");

    console.log("Initial dark mode check:", prefersDark.matches);

    function updateColors() {
      const frame = document.getElementById("kwize-frame");
      const isDark = prefersDark.matches;

      console.log("Updating colors - Dark mode:", isDark);

      // Kwize API requires hex colors without #
      // For dark mode: white text on dark background
      // For light mode: dark text on light background
      let textColor, bgColor;
      
      if (isDark) {
        textColor = "ffffff"; // white text
        bgColor = "1a1a1a";   // dark background
      } else {
        textColor = "000000"; // black text
        bgColor = "f5f5f5";   // light background
      }

      console.log("Colors set to - Text:", textColor, "BG:", bgColor);

      frame.src =
        "https://kwize.com/quote-of-the-day/embed/&txt=0&font=Times" +
        "&color=" + textColor +
        "&background=" + bgColor +
        "&uid=1752&fid=writing&dy=0";
    }

    updateColors();
    prefersDark.addEventListener("change", updateColors);
  </script>
</body>
</html>
