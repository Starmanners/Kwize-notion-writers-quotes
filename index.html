<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kwize Quote of the Day</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="quote-wrapper">
    <iframe
      id="kwize-frame"
      src="https://kwize.com/quote-of-the-day/embed/&txt=0&font=Times&color=000000&background=ffffff&uid=1752&fid=writing&dy=0"
      frameborder="0"
      loading="lazy"
    ></iframe>
  </div>

  <script>
    // Detect dark mode
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)");

    function updateColors() {
      const frame = document.getElementById("kwize-frame");
      const isDark = prefersDark.matches;

      const textColor = isDark ? "ffffff" : "000000";
      const bgColor = "00000000"; // transparent

      frame.src =
        "https://kwize.com/quote-of-the-day/embed/&txt=0&font=Times" +
        "&color=" + textColor +
        "&background=" + bgColor +
        "&uid=1752&fid=writing&dy=0";
    }

    updateColors();
    prefersDark.addEventListener("change", updateColors);
  </script>
</body>
</html>
