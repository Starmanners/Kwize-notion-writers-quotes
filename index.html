<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kwize Quote of the Day</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="quote-container">
    <iframe
      id="kwize-frame"
      src="https://kwize.com/quote-of-the-day/embed/&txt=0&font=Times&color=ffffff&background=1a1a1a&uid=1752&fid=writing&dy=0"
      frameborder="0"
      allow="fullscreen"
      referrerpolicy="no-referrer"
      loading="lazy"
      title="Kwize Quote of the Day"
    ></iframe>
  </div>

  <script>
    // Detect dark mode
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)");
    const frame = document.getElementById("kwize-frame");

    console.log("Initial dark mode check:", prefersDark.matches);

    function updateColors() {
      const isDark = prefersDark.matches;

      console.log("Updating colors - Dark mode:", isDark);

      // Kwize API requires hex colors without #
      let textColor, bgColor;
      
      if (isDark) {
        textColor = "ffffff"; // white text
        bgColor = "1a1a1a";   // dark background
      } else {
        textColor = "000000"; // black text
        bgColor = "f5f5f5";   // light background
      }

      console.log("Colors set to - Text:", textColor, "BG:", bgColor);

      frame.src =
        "https://kwize.com/quote-of-the-day/embed/&txt=0&font=Times" +
        "&color=" + textColor +
        "&background=" + bgColor +
        "&uid=1752&fid=writing&dy=0";
    }

    updateColors();
    prefersDark.addEventListener("change", updateColors);

    // Handle Notion embed responsiveness
    function resizeFrame() {
      try {
        // Calculate proper height for responsive content
        const container = document.querySelector(".quote-container");
        const height = container.scrollHeight || 300;
        
        // Send message to parent if in iframe (Notion)
        if (window.self !== window.top) {
          window.parent.postMessage(
            { type: "RESIZE", height: height },
            "*"
          );
        }
      } catch (e) {
        console.log("Resize message not needed");
      }
    }

    // Resize on load and when content changes
    window.addEventListener("load", resizeFrame);
    window.addEventListener("resize", resizeFrame);
    
    // Observe for content changes
    const observer = new MutationObserver(resizeFrame);
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
